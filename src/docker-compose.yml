version: '3.8'

services:

  mysql:
    image: mysql:8.0
    container_name: levelup-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: levelup_db
      MYSQL_USER: levelup
      MYSQL_PASSWORD: levelup123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d
    networks:
      - levelup-network

  api:
    build: .
    container_name: levelup-api
    environment:
      DATASOURCES_DEFAULT_URL: jdbc:mysql://mysql:3306/levelup_db
      DATASOURCES_DEFAULT_USERNAME: levelup
      DATASOURCES_DEFAULT_PASSWORD: levelup123
    ports:
      - "8080:8080"
    depends_on:
      - mysql
    networks:
      - levelup-network

  tomcat:
    image: tomcat:9.0
    container_name: levelup-tomcat
    ports:
      - "8081:8080"
    volumes:
      - ./levelUP:/usr/local/tomcat/webapps/levelup
    depends_on:
      - api
    networks:
      - levelup-network

volumes:
  mysql_data:

networks:
  levelup-network:
    driver: bridge